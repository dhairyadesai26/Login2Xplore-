<!DOCTYPE html>
<html>
<head>
    <title>Student Enrollment Form using JPDB</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>

<body>

<div class="container">

    <div class="page-header text-center">
        <h2>Student Enrollment Form using JPDB API</h2>
    </div>

    <form id="studentForm">

        <div class="form-group">
            <label>Roll No :</label>
            <input type="text"
                   id="rollNo"
                   class="form-control"
                   onchange="getStudent()">
        </div>

        <div class="form-group">
            <label>Full Name :</label>
            <input type="text"
                   id="fullName"
                   class="form-control">
        </div>

        <div class="form-group">
            <label>Class :</label>
            <input type="text"
                   id="studentClass"
                   class="form-control">
        </div>

        <div class="form-group">
            <label>Birth Date :</label>
            <input type="date"
                   id="birthDate"
                   class="form-control">
        </div>

        <div class="form-group">
            <label>Address :</label>
            <textarea id="address"
                      class="form-control"></textarea>
        </div>

        <div class="form-group">
            <label>Enrollment Date :</label>
            <input type="date"
                   id="enrollmentDate"
                   class="form-control">
        </div>

        <div class="form-group text-center">

            <button type="button"
                    id="save"
                    class="btn btn-lg btn-primary"
                    onclick="saveData()"
                    disabled>
                Save
            </button>

            <button type="button"
                    id="update"
                    class="btn btn-lg btn-primary"
                    onclick="updateData()"
                    disabled>
                Update
            </button>

            <button type="button"
                    id="reset"
                    class="btn btn-lg btn-primary"
                    onclick="resetForm()"
                    disabled>
                Reset
            </button>

        </div>

    </form>

</div>

<script
src="http://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js">
</script>

<script src="js/index.js"></script>

</body>
</html>
